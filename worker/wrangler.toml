name = "tarboard-claude"
main = "worker.js"
compatibility_date = "2024-11-01"

# Optional shared token the page sends as x-demo-token (set with: wrangler secret put DEMO_TOKEN)
# and an exact origin to allow in addition to file:// ("null").
[vars]
ALLOW_ORIGIN = "https://tarboard.pages.dev"
# DEMO_TOKEN is better set as a secret; ALLOW_ORIGIN can be pinned to your Pages/host URL for the demo.

# Per-IP daily cap (created with: npx wrangler kv namespace create RATE_KV)
[[kv_namespaces]]
binding = "RATE_KV"
id = "3c1a6e0726bb452ca55c9c09bc532424"
